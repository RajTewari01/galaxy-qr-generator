name: 🚀 Build and Release Galaxy QR Core

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies

    - name: 🐧 Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libxcb-xinerama0

    - name: 📦 Install Python Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      shell: bash

    - name: 🧪 Verify Argparse Execution
      run: |
        python src/main.py --help
      shell: bash

    - name: 🔨 Generate PyInstaller Executable
      run: |
        pyinstaller UltimateQR.spec
      shell: bash

    - name: 📤 Upload Artifact - Windows
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: GalaxyQR-Windows-Standalone
        path: dist/GalaxyQR.exe
        retention-days: 7

    - name: 📤 Upload Artifact - macOS
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: GalaxyQR-macOS-AppBundle
        path: dist/GalaxyQR.app
        retention-days: 7

    - name: 📤 Upload Artifact - Linux
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: GalaxyQR-Linux-Executable
        path: dist/GalaxyQR
        retention-days: 7
